<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Quản Lý Kho IPTV</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 15px; }
        .container { max-width: 900px; margin: auto; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: #1a73e8; color: white; padding: 20px; text-align: center; font-size: 20px; font-weight: bold; }
        
        .repo-item { border-bottom: 1px solid #eee; }
        .repo-header { display: flex; justify-content: space-between; align-items: center; padding: 15px; cursor: pointer; background: #fff; transition: 0.3s; }
        .repo-header:hover { background: #f8f9fa; }
        .repo-name { font-weight: bold; color: #1a73e8; display: flex; align-items: center; }
        .repo-name::before { content: '📦'; margin-right: 10px; }
        
        .file-list { display: none; background: #fafafa; padding: 0 15px 15px 40px; border-top: 1px dashed #ddd; }
        .file-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; font-size: 14px; text-decoration: none; color: #333; }
        .file-item:hover { color: #1a73e8; }
        
        .badge { background: #e8f0fe; color: #1967d2; padding: 2px 8px; border-radius: 10px; font-size: 11px; }
        .all-special { background: #fffde7 !important; }
        .intl-special { background: #f1f8e9 !important; }
        .active .file-list { display: block; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">📁 TRÌNH DUYỆT KHO TỆP IPTV</div>
    <div id="main-content">Đang quét các nhóm hàng...</div>
</div>

<script>
    const GITHUB_USER = 'thung65';

    async function fetchRepos() {
        const response = await fetch(`https://api.github.com/users/${GITHUB_USER}/repos?sort=updated`);
        let repos = await response.json();
        const container = document.getElementById('main-content');
        container.innerHTML = '';

        // Sắp xếp nhóm: All đầu, International cuối
        repos.sort((a, b) => {
            if (a.name.toLowerCase().includes('all')) return -1;
            if (b.name.toLowerCase().includes('all')) return 1;
            if (a.name.toLowerCase().includes('international')) return 1;
            if (b.name.toLowerCase().includes('international')) return -1;
            return 0;
        });

        for (let repo of repos) {
            const repoDiv = document.createElement('div');
            repoDiv.className = 'repo-item';
            if(repo.name.toLowerCase().includes('all')) repoDiv.classList.add('all-special');
            if(repo.name.toLowerCase().includes('international')) repoDiv.classList.add('intl-special');

            repoDiv.innerHTML = `
                <div class="repo-header" onclick="toggleRepo(this, '${repo.name}')">
                    <span class="repo-name">${repo.name}</span>
                    <span class="badge">${repo.size} KB</span>
                </div>
                <div class="file-list" id="files-${repo.name}">Đang tải tệp...</div>
            `;
            container.appendChild(repoDiv);
        }
    }

    async function toggleRepo(element, repoName) {
        const parent = element.parentElement;
        const listDiv = document.getElementById(`files-${repoName}`);
        
        parent.classList.toggle('active');

        if (parent.classList.contains('active') && listDiv.innerHTML === 'Đang tải tệp...') {
            const res = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${repoName}/contents/`);
            const files = await res.json();
            listDiv.innerHTML = '';

            files.forEach(file => {
                if(file.name === 'index.html' || file.name === '_redirects') return;
                
                const fileLink = document.createElement('a');
                fileLink.className = 'file-item';
                fileLink.href = file.download_url; // Bấm vào file là mở luôn
                fileLink.innerHTML = `
                    <span>📄 ${file.name}</span>
                    <span style="color:#999">${(file.size / 1024).toFixed(1)} KB</span>
                `;
                listDiv.appendChild(fileLink);
            });
        }
    }

    fetchRepos();
</script>

</body>
</html>
