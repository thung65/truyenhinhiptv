<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trần Tất Khôi B - Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #f0f2f5; /* Nền xám nhạt để làm nổi cái khung trắng */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* ĐÂY LÀ CÁI KHUNG MÀ KHÔI MUỐN */
        .main-card {
            background: #ffffff;
            width: 90%;
            max-width: 350px;
            padding: 40px 25px;
            border-radius: 20px; /* Bo góc cực mượt */
            /* Đổ bóng sâu để tạo hiệu ứng nổi (nhìn rất giống ảnh mẫu) */
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1); 
            text-align: center;
        }

        .profile-logo {
            width: 85px;
            height: 85px;
            border-radius: 50%;
            border: 1px solid #eee;
            padding: 3px;
            margin-bottom: 15px;
        }

        .name {
            font-size: 20px;
            font-weight: bold;
            color: #333;
            margin: 0;
        }

        .sub-title {
            font-size: 12px;
            color: #888;
            font-style: italic;
            margin-bottom: 15px;
            display: block;
        }

        .bio {
            font-size: 13px;
            color: #666;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        /* Các nút mạng xã hội nằm trong khung */
        .social-links {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .social-btn {
            text-decoration: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: bold;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }

        .social-btn i {
            margin-right: 10px;
            font-size: 16px;
        }

        .btn-fb { background: #1877F2; }
        .btn-gh { background: #24292e; }
        .btn-tk { background: #000; }
        .btn-yt { background: #FF0000; }

        .social-btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="main-card">
        <img src="https://github.com/thung65.png" class="profile-logo" alt="Logo">
        
        <h1 class="name">Trần Tất Khôi</h1>
        <span class="sub-title">Web Developer & Tech Enthusiast</span>
        
        <p class="bio">
            Chào mừng bạn đã ghé thăm trang cá nhân của mình. <br>
            Mình yêu thích lập trình, sáng tạo nội dung và kết nối với mọi người.
        </p>
        
        <div class="social-links">
            <a href="https://facebook.com/..." target="_blank" class="social-btn btn-fb">
                <i class="fab fa-facebook"></i> Facebook
            </a>
            <a href="https://github.com/..." target="_blank" class="social-btn btn-gh">
                <i class="fab fa-github"></i> GitHub
            </a>
            <a href="https://tiktok.com/..." target="_blank" class="social-btn btn-tk">
                <i class="fab fa-tiktok"></i> TikTok
            </a>
            <a href="https://youtube.com/..." target="_blank" class="social-btn btn-yt">
                <i class="fab fa-youtube"></i> YouTube
            </a>
        </div>
    </div>
    </body>
</html>
