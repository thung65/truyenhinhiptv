<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Kho IPTV - thung65</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); overflow: hidden; }
        .header { background: #1a73e8; color: white; padding: 25px; text-align: center; font-size: 22px; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8f9fa; padding: 15px; text-align: left; color: #5f6368; font-size: 13px; border-bottom: 2px solid #eee; }
        td { padding: 15px; border-bottom: 1px solid #eee; }
        .repo-link { text-decoration: none; color: #1a73e8; font-weight: bold; display: flex; align-items: center; }
        .repo-link:hover { text-decoration: underline; }
        .badge { background: #e8f0fe; color: #1967d2; padding: 4px 10px; border-radius: 20px; font-size: 12px; }
        .date { color: #70757a; font-size: 13px; }
        /* Đánh dấu All và International */
        .all-row { background: #fff9c4 !important; }
        .intl-row { background: #e8f5e9 !important; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">📂 TỔNG HỢP CÁC KHO DỮ LIỆU (REPOS)</div>
    <table>
        <thead>
            <tr>
                <th>Tên Nhóm (Kho)</th>
                <th>Dung lượng</th>
                <th>Cập nhật lần cuối</th>
            </tr>
        </thead>
        <tbody id="repo-list">
            </tbody>
    </table>
</div>

<script>
    const GITHUB_USER = 'thung65';
    // Link API lấy tất cả các nhóm của bạn
    const REPO_API = `https://api.github.com/users/${GITHUB_USER}/repos?sort=updated`;

    function formatSize(kb) {
        if (kb < 1024) return kb + ' KB';
        return (kb / 1024).toFixed(2) + ' MB';
    }

    async function fetchRepos() {
        try {
            const response = await fetch(REPO_API);
            let repos = await response.json();
            const listBody = document.getElementById('repo-list');
            listBody.innerHTML = '';

            // Sắp xếp theo ý bạn: Nhóm có chữ 'All' lên đầu, 'International' xuống cuối
            repos.sort((a, b) => {
                const nameA = a.name.toLowerCase();
                const nameB = b.name.toLowerCase();
                if (nameA.includes('all')) return -1;
                if (nameB.includes('all')) return 1;
                if (nameA.includes('international')) return 1;
                if (nameB.includes('international')) return -1;
                return 0;
            });

            repos.forEach(repo => {
                // Chỉ hiện các nhóm công khai và không phải là trang web hiện tại (nếu muốn)
                const tr = document.createElement('tr');
                
                if (repo.name.toLowerCase().includes('all')) tr.className = 'all-row';
                if (repo.name.toLowerCase().includes('international')) tr.className = 'intl-row';

                const updatedDate = new Date(repo.updated_at).toLocaleDateString('vi-VN');

                tr.innerHTML = `
                    <td>
                        <a class="repo-link" href="${repo.html_url}">
                            📦 ${repo.name}
                        </a>
                    </td>
                    <td><span class="badge">${formatSize(repo.size)}</span></td>
                    <td class="date">${updatedDate}</td>
                `;
                listBody.appendChild(tr);
            });
        } catch (error) {
            document.getElementById('repo-list').innerHTML = '<tr><td colspan="3">Không thể tải danh sách nhóm!</td></tr>';
        }
    }

    fetchRepos();
</script>

</body>
</html>
