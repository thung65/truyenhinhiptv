<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trần Tất Khôi B - Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #f0f2f5; /* Nền xám nhạt để làm nổi cái khung trắng */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        } 
        
/* Tìm đến đoạn CSS của Card và thay bằng cái này */
.main-card {
    background: #ffffff;
    width: 90%;
    max-width: 380px; /* Tăng độ rộng lên một tí */
    padding: 50px 35px; /* Tăng khoảng cách bên trong cho thoáng */
    border-radius: 24px; /* Bo góc tròn hơn nhìn sẽ hiện đại hơn */
    box-shadow: 0 20px 45px rgba(0, 0, 0, 0.1); /* Đổ bóng sâu hơn cho nổi */
    text-align: center;
    box-sizing: border-box; /* Đảm bảo padding không làm hỏng kích thước */
}

/* Khoảng cách giữa các phần bên trong */
.profile-logo {
    width: 100px; /* Cho logo to lên một tí */
    height: 100px;
    margin-bottom: 25px; /* Đẩy tên xuống xa hơn */
}

.name {
    font-size: 24px; /* Tên to và rõ hơn */
    margin-bottom: 10px;
}

.bio {
    font-size: 14.5px;
    margin-bottom: 35px; /* Tạo khoảng trống trước khi đến các nút */
    line-height: 1.7;
}

/* Làm các nút bấm nhìn "xịn" hơn */
.social-btn {
    padding: 14px 0; /* Nút dày dặn hơn */
    margin-bottom: 12px;
    border-radius: 10px;
    font-size: 14px;
    letter-spacing: 0.5px; /* Giãn chữ ra một tí cho chuyên nghiệp */
}
        
        .social-btn i {
            margin-right: 10px;
            font-size: 16px;
        }

        .btn-fb { background: #1877F2; }
        .btn-gh { background: #24292e; }
        .btn-tk { background: #000; }
        .btn-yt { background: #FF0000; }

        .social-btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="main-card">
        <img src="https://github.com/thung65.png" class="profile-logo" alt="Logo">
        
        <h1 class="name">Trần Tất Khôi</h1>
        <span class="sub-title">Web Developer & Tech Enthusiast</span>
        
        <p class="bio">
            Chào mừng bạn đã ghé thăm trang cá nhân của mình. <br>
            Mình yêu thích lập trình, sáng tạo nội dung và kết nối với mọi người.
        </p>
        
        <div class="social-links">
            <a href="https://facebook.com/..." target="_blank" class="social-btn btn-fb">
                <i class="fab fa-facebook"></i> Facebook
            </a>
            <a href="https://github.com/..." target="_blank" class="social-btn btn-gh">
                <i class="fab fa-github"></i> GitHub
            </a>
            <a href="https://tiktok.com/..." target="_blank" class="social-btn btn-tk">
                <i class="fab fa-tiktok"></i> TikTok
            </a>
            <a href="https://youtube.com/..." target="_blank" class="social-btn btn-yt">
                <i class="fab fa-youtube"></i> YouTube
            </a>
        </div>
    </div>
    </body>
</html>
