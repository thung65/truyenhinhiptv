<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTV Manager - Full View</title>
    <style>
:root {
    --bg: #f4f6f9; 
    --card: #ffffff; 
    --text: #333333;   /* Chữ đen cho nền sáng */
    --view-bg: #ffffff; /* Nền trắng cho ô xem file */
    /* ... các dòng khác giữ nguyên ... */
}

[data-theme="dark"] {
    --bg: #121212; 
    --card: #1e1e1e; 
    --text: #ffffff;    /* Chữ trắng cho nền tối */
    --view-bg: #000000;  /* Nền đen cho ô xem file */
    /* ... các dòng khác giữ nguyên ... */
}

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; transition: 0.3s; }
        .container { max-width: 1000px; margin: auto; background: var(--card); border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.2); overflow: hidden; min-height: 90vh; display: flex; flex-direction: column; }
        
        .nav { background: var(--nav); color: white; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .theme-btn { cursor: pointer; background: rgba(255,255,255,0.2); border: none; padding: 5px 12px; border-radius: 20px; color: white; }

        table { width: 100%; border-collapse: collapse; }
        td { padding: 15px; border-bottom: 1px solid var(--border); }
        tr:hover { background: var(--item-hover); }

        .back-row { background: rgba(26, 115, 232, 0.08); cursor: pointer; }
        .back-row td { color: var(--nav); font-size: 24px; font-weight: bold; text-align: center; padding: 10px; }

        .item-name { font-weight: 500; cursor: pointer; display: block; width: 100%; }
        .badge { background: #e8f0fe; color: #1967d2; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: bold; }

        /* KHU VỰC HIỂN THỊ FULL */
        #viewer { display: none; flex-grow: 1; padding: 10px; background: var(--card); border-top: 4px solid var(--nav); }
        .view-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border-bottom: 1px solid var(--border); padding-bottom: 5px; }
        
        #file-content { 
            white-space: pre-wrap; 
            background: #000; 
            color: #4caf50; 
            padding: 15px; 
            border-radius: 8px; 
            overflow: auto; 
            font-family: 'Consolas', monospace; 
            font-size: 13px;
            width: calc(100% - 30px); /* Full chiều ngang */
            height: 70vh; /* Tăng chiều cao lên 70% màn hình */
        }

        #img-view { 
            width: 100%; /* Full chiều ngang container */
            max-width: 100%;
            height: auto; 
            border-radius: 8px; 
            display: none; 
            margin: auto;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .row-all { border-left: 6px solid #fbc02d; }
        .row-intl { border-left: 6px solid #4caf50; }
    </style>
</head>
<body>

<div class="container">
    <div class="nav">
        <span id="status-text" style="font-weight: bold;">📂 QUẢN LÝ IPTV</span>
        <button class="theme-btn" onclick="toggleTheme()">🌓</button>
    </div>
    
    <div id="list-area">
        <table>
            <tbody id="list-body"></tbody>
        </table>
    </div>

    <div id="viewer">
        <div class="view-header">
            <span id="view-title" style="font-weight: bold; font-size: 14px; color: var(--nav);"></span>
        </div>
        <img id="img-view" src="">
        <pre id="file-content"></pre>
    </div>
</div>

<script>
    const USER = 'thung65';
    let viewMode = 'repos';

    function toggleTheme() {
        const t = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', t);
        localStorage.setItem('theme', t);
    }
    if(localStorage.getItem('theme') === 'dark') document.documentElement.setAttribute('data-theme', 'dark');

    async function loadRepos() {
        viewMode = 'repos';
        document.getElementById('list-area').style.display = 'block';
        document.getElementById('viewer').style.display = 'none';
        document.getElementById('status-text').innerText = '📂 DANH SÁCH NHÓM';
        const res = await fetch(`https://api.github.com/users/${USER}/repos?sort=updated`);
        render(await res.json(), 'repo');
    }

    async function loadFiles(repoName) {
        viewMode = 'files';
        document.getElementById('list-area').style.display = 'block';
        document.getElementById('viewer').style.display = 'none';
        document.getElementById('status-text').innerText = `📁 ${repoName.toUpperCase()}`;
        const res = await fetch(`https://api.github.com/repos/${USER}/${repoName}/contents/`);
        render(await res.json(), 'file');
    }

    async function openContent(url, name) {
        const area = document.getElementById('list-area');
        const v = document.getElementById('viewer');
        const img = document.getElementById('img-view');
        const txt = document.getElementById('file-content');
        
        area.style.display = 'none'; // Ẩn danh sách để hiện nội dung Full
        v.style.display = 'block';
        document.getElementById('view-title').innerText = name;
        
        const ext = name.split('.').pop().toLowerCase();
        if(['jpg','png','jpeg','gif','webp'].includes(ext)) {
            img.src = url; img.style.display = 'block'; txt.style.display = 'none';
        } else {
            const res = await fetch(url);
            txt.innerText = await res.text();
            txt.style.display = 'block'; img.style.display = 'none';
        }
    }

    function render(items, type) {
        const body = document.getElementById('list-body');
        body.innerHTML = '';
        
        // HÀNG 3 CHẤM ĐỂ BACK (Luôn hiện ở đầu bảng)
        const backRow = document.createElement('tr');
        backRow.className = 'back-row';
        backRow.innerHTML = `<td colspan="2">⋯</td>`;
        backRow.onclick = () => {
            if(viewMode === 'files') loadRepos();
            else alert("Đã ở trang chủ");
        };
        body.appendChild(backRow);

        items.sort((a, b) => {
            const nA = a.name.toLowerCase();
            const nB = b.name.toLowerCase();
            if(nA.includes('all')) return -1;
            if(nB.includes('all')) return 1;
            if(nA.includes('international')) return 1;
            if(nB.includes('international')) return -1;
            return 0;
        });

        items.forEach(item => {
            if(item.name === 'index.html' || item.name === '_redirects') return;
            const tr = document.createElement('tr');
            if(item.name.toLowerCase().includes('all')) tr.className = 'row-all';
            if(item.name.toLowerCase().includes('international')) tr.className = 'row-intl';

            tr.innerHTML = `
                <td><span class="item-name">${item.name}</span></td>
                <td style="text-align: right;"><span class="badge">${item.size ? (item.size/1024).toFixed(1) : '--'} KB</span></td>
            `;
            tr.onclick = () => {
                if(type === 'repo') loadFiles(item.name);
                else openContent(item.download_url, item.name);
            };
            body.appendChild(tr);
        });
    }

    loadRepos();
</script>
</body>
</html>
