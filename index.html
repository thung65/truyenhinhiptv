<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trần Tất Khôi B - Trang Chủ</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg: #f4f6f8; --card: #ffffff; --text: #333; --accent: #007bff;
            --border: #ececec; --item-hover: #f9f9f9; --folder-icon: #ffca28;
        }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; }
        
        .profile-section { text-align: center; padding: 40px 20px; background: var(--card); border-bottom: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; }
        .profile-logo { width: 90px; height: 90px; border-radius: 50%; border: 3px solid var(--accent); padding: 3px; margin-bottom: 15px; }
        .profile-name { font-size: 22px; font-weight: bold; margin: 0; text-transform: uppercase; }
        
        /* PHẦN ICON MẠNG XÃ HỘI NHỎ (DẠNG NGANG) */
        .social-mini {
            display: flex;
            gap: 15px;
            margin: 20px 0;
        }
        .mini-icon {
            text-decoration: none;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: #f0f2f5;
            color: #555;
            font-size: 18px;
            transition: 0.3s;
        }
        .mini-icon:hover { transform: translateY(-3px); color: white; }
        .fb:hover { background: #1877F2; }
        .tk:hover { background: #000; }
        .gh:hover { background: #333; }
        .yt:hover { background: #F00; }

        /* NÚT BẤM DÀI (NẾU MUỐN GIỮ) */
        .social-links { display: flex; flex-direction: column; align-items: center; gap: 8px; width: 100%; max-width: 250px; }
        .social-btn { text-decoration: none; width: 100%; padding: 10px 0; border-radius: 8px; font-size: 12px; font-weight: bold; color: white; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .btn-fb { background: #1877F2; } .btn-tk { background: #000; } .btn-gh { background: #333; } .btn-yt { background: #F00; }
        .social-btn i { font-size: 16px; margin-right: 10px; }
    </style>
</head>
<body>

<div class="profile-section">
    <img src="https://github.com/thung65.png" class="profile-logo" alt="Logo">
    
    <h1 class="profile-name">Trần Tất Khôi</h1>
    
    <p style="color: #666; font-style: italic; font-size: 14px; margin: 10px 0 5px 0;">
        Web Developer & Tech Enthusiast
    </p>
    
    <p style="max-width: 450px; font-size: 14px; color: #555; line-height: 1.6; margin-bottom: 20px;">
        Chào mừng bạn đã ghé thăm trang cá nhân của mình. <br>
        Mình yêu thích lập trình và sáng tạo nội dung.
    </p>
    <div class="social-mini">
        <a href="https://www.facebook.com/share/18WousdjEC/" target="_blank" class="mini-icon fb"><i class="fab fa-facebook-f"></i></a>
        <a href="https://www.tiktok.com/@tranthai845" target="_blank" class="mini-icon tk"><i class="fab fa-tiktok"></i></a>
        <a href="https://github.com/thung65" target="_blank" class="mini-icon gh"><i class="fab fa-github"></i></a>
        <a href="https://www.youtube.com/@trantatkhoi2k14" target="_blank" class="mini-icon yt"><i class="fab fa-youtube"></i></a>
    </div>

</body>
</html>
