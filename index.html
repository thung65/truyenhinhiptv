<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VMT IPTV MANAGER</title>
    <style>
        :root {
            --bg: #f4f6f8; --card: #ffffff; --text: #333; --accent: #007bff;
            --border: #ececec; --item-hover: #f9f9f9;
        }
        [data-theme="dark"] {
            --bg: #121212; --card: #1e1e1e; --text: #e0e0e0; --accent: #3791ff;
            --border: #333; --item-hover: #2c2c2c;
        }

        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; transition: 0.2s; }
        
        /* HEADER BIO-LINK */
        .profile-section { text-align: center; padding: 40px 20px; background: var(--card); border-bottom: 1px solid var(--border); }
        .profile-logo { width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--accent); padding: 3px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .profile-name { font-size: 24px; font-weight: bold; margin: 0; text-transform: uppercase; letter-spacing: 1px; }
        
        .social-links { margin-top: 20px; display: flex; justify-content: center; gap: 12px; }
        .social-btn { text-decoration: none; padding: 10px 22px; border-radius: 25px; font-size: 12px; font-weight: bold; color: white; transition: 0.3s; }
        .btn-fb { background: #1877F2; } .btn-yt { background: #FF0000; }

        /* DANH SÁCH FILE (KHÔNG GẠCH NGANG) */
        .container { max-width: 850px; margin: 25px auto; background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid var(--border); box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; }
        
        /* HÀNG BA CHẤM */
        .dot-col { width: 50px; text-align: center; font-size: 26px; font-weight: bold; color: var(--accent); }
        .file-item td { padding: 16px; vertical-align: middle; border: none; cursor: pointer; }
        .file-item:hover { background: var(--item-hover); }
        
        .col-icon { width: 50px; text-align: center; font-size: 22px; }
        .col-name { font-weight: 500; font-size: 16px; }
        .col-date { text-align: right; font-size: 12px; color: #999; padding-right: 20px !important; }

        /* VIEW FILE (ẢNH 2) */
        #viewer { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 999; padding: 20px; box-sizing: border-box; overflow: auto; }
        [data-theme="dark"] #viewer { background: #121212; color: #fff; }
        .v-nav { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ddd; padding-bottom: 10px; margin-bottom: 15px; }
        pre { white-space: pre-wrap; font-family: 'Consolas', monospace; font-size: 14px; line-height: 1.5; }
        .btn-close { background: #ff4757; color: white; border: none; padding: 8px 16px; border-radius: 5px; cursor: pointer; font-weight: bold; }

        .theme-toggle { position: fixed; bottom: 20px; right: 20px; background: var(--accent); color: white; border: none; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; font-size: 20px; z-index: 100; }
    </style>
</head>
<body>

<button class="theme-toggle" onclick="toggleTheme()">🌓</button>

<div id="index-page">
    <div class="profile-section">
        <img src="https://github.com/thung65.png" class="profile-logo" alt="VMT">
        <h1 class="profile-name">TRẦN KHÔI B</h1>
        <div class="social-links">
            <a href="https://www.facebook.com/share/18WousdjEC/" target="_blank" class="social-btn btn-fb">FACEBOOK</a>
            <a href="https://www.youtube.com/@trantatkhoi2k14" target="_blank" class="social-btn btn-yt">YOUTUBE</a>
        </div>
    </div>

    <div class="container">
        <table>
            <tbody id="list-body"></tbody>
        </table>
    </div>
</div>

<div id="viewer">
    <div class="v-nav">
        <span id="v-title" style="font-weight: bold; opacity: 0.6;"></span>
        <button class="btn-close" onclick="closeViewer()">ĐÓNG</button>
    </div>
    <img id="v-img" style="max-width: 100%; display: none; margin: auto; border-radius: 8px;">
    <pre id="v-content"></pre>
</div>

<script>
    const USER = 'thung65';
    let isRoot = true;

    function toggleTheme() {
        const theme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('theme', theme);
    }
    if(localStorage.getItem('theme') === 'dark') document.documentElement.setAttribute('data-theme', 'dark');

    async function loadRepos() {
        isRoot = true;
        const r = await fetch(`https://api.github.com/users/${USER}/repos?sort=updated`);
        render(await r.json(), 'repo');
    }

    async function loadFiles(name) {
        isRoot = false;
        const r = await fetch(`https://api.github.com/repos/${USER}/${name}/contents/`);
        render(await r.json(), 'file');
    }

    function render(data, type) {
        const body = document.getElementById('list-body');
        body.innerHTML = '';

        // 1. HÀNG BA CHẤM (CHỈ HIỆN ⋯, BÊN CẠNH TRỐNG)
        const back = document.createElement('tr');
        back.className = 'file-item';
        back.innerHTML = `<td class="dot-col">⋯</td><td colspan="2"></td>`;
        back.onclick = () => { if(!isRoot) loadRepos(); };
        body.appendChild(back);

        // 2. SẮP XẾP (All lên đầu, International xuống cuối)
        data.sort((a, b) => {
            const nA = a.name.toLowerCase();
            if(nA.includes('all')) return -1;
            if(nA.includes('international')) return 1;
            return 0;
        });

        // 3. DUYỆT TỆP TIN
        data.forEach(item => {
            if(['index.html', '_redirects'].includes(item.name)) return;
            const tr = document.createElement('tr');
            tr.className = 'file-item';

            let icon = '📄';
            const ext = item.name.split('.').pop().toLowerCase();
            if (type === 'repo' || item.type === 'dir') icon = '📁';
            else if (['jpg', 'jpeg', 'png', 'gif', 'webp'].includes(ext)) icon = '🖼️';

            // Lấy ngày Last Modified (giả lập 2026-04-05 nếu không có dữ liệu)
            let date = item.updated_at ? new Date(item.updated_at).toISOString().split('T')[0] : "2026-04-05";

            tr.innerHTML = `
                <td class="col-icon">${icon}</td>
                <td class="col-name">${item.name}</td>
                <td class="col-date">${date}</td>
            `;
            tr.onclick = () => (type === 'repo') ? loadFiles(item.name) : openFile(item.download_url, item.name);
            body.appendChild(tr);
        });
    }

    async function openFile(url, name) {
        document.getElementById('index-page').style.display = 'none';
        document.getElementById('viewer').style.display = 'block';
        document.getElementById('v-title').innerText = name;
        const ext = name.split('.').pop().toLowerCase();
        if(['jpg','png','jpeg','webp','gif'].includes(ext)) {
            document.getElementById('v-img').src = url;
            document.getElementById('v-img').style.display = 'block';
            document.getElementById('v-content').style.display = 'none';
        } else {
            const res = await fetch(url);
            document.getElementById('v-content').innerText = await res.text();
            document.getElementById('v-content').style.display = 'block';
            document.getElementById('v-img').style.display = 'none';
        }
    }

    function closeViewer() {
        document.getElementById('viewer').style.display = 'none';
        document.getElementById('index-page').style.display = 'block';
    }

    loadRepos();
</script>
</body>
</html>
