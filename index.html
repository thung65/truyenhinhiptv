<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trần Tất Khôi - Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .card {
            background: #fff;
            padding: 2.5rem; /* Tăng padding một chút cho thoáng như Khôi muốn */
            border-radius: 20px; /* Bo góc mượt hơn */
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); /* Đổ bóng sâu hơn cho nổi */
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        .avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #007bff;
            margin-bottom: 1.2rem;
            padding: 3px;
        }
        h1 {
            margin: 10px 0;
            color: #222;
            font-size: 22px;
            text-transform: uppercase;
        }
        .role {
            color: #666;
            font-weight: 600;
            font-size: 13px;
            margin-bottom: 15px;
        }
        .bio {
            color: #555;
            line-height: 1.6;
            font-size: 14px;
            margin-bottom: 25px;
        }
        .social-links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .social-item {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 14px;
            border-radius: 10px;
            text-decoration: none;
            color: white;
            font-weight: bold;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        .social-item:hover {
            transform: translateY(-3px);
            filter: brightness(1.1);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .social-item i {
            margin-right: 12px;
            font-size: 1.3rem;
            width: 20px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="https://github.com/thung65.png" alt="Avatar" class="avatar">
        
        <h1>Trần Tất Khôi</h1>
        <div class="role">Web Developer & Tech Enthusiast</div>
        
        <p class="bio">
            Chào mừng bạn đã ghé thăm trang cá nhân của mình. <br>
            Mình yêu thích lập trình, sáng tạo nội dung và kết nối với mọi người.
        </p>

        <div class="social-links">
            <a href="https://www.facebook.com/share/18WousdjEC/" class="social-item" target="_blank" style="background-color: #1877F2;">
                <i class="fab fa-facebook-f"></i> Facebook
            </a>
            
            <a href="https://github.com/thung65" class="social-item" target="_blank" style="background-color: #24292e;">
                <i class="fab fa-github"></i> GitHub
            </a>
            
            <a href="https://www.tiktok.com/@tranthai845" class="social-item" target="_blank" style="background-color: #000000;">
                <i class="fab fa-tiktok"></i> TikTok
            </a>
            
            <a href="https://www.youtube.com/@trantatkhoi2k14" class="social-item" target="_blank" style="background-color: #FF0000;">
                <i class="fab fa-youtube"></i> YouTube
            </a>
        </div>
    </div>

</body>
</html>
