<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTV Explorer - Pro View</title>
    <style>
        :root {
            --primary: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --bg: #f0f2f5; --card: #ffffff; --text: #2d3436;
            --border: #edf2f7; --hover: #f8fafc; --view-bg: #ffffff;
        }
        [data-theme="dark"] {
            --bg: #0f172a; --card: #1e293b; --text: #f1f5f9;
            --border: #334155; --hover: #33415566; --view-bg: #000000;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; transition: 0.3s; }
        .container { max-width: 900px; margin: auto; background: var(--card); border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; min-height: 92vh; display: flex; flex-direction: column; }
        
        /* HEADER */
        .header { background: var(--primary); padding: 15px 20px; color: white; display: flex; justify-content: space-between; align-items: center; }
        .theme-toggle { cursor: pointer; background: rgba(255,255,255,0.2); border: none; width: 35px; height: 35px; border-radius: 10px; color: white; }

        /* TABLE */
        table { width: 100%; border-collapse: collapse; }
        td { padding: 16px; border-bottom: 1px solid var(--border); cursor: pointer; }
        tr:hover td { background: var(--hover); }

        .back-row { background: var(--hover); text-align: center; font-size: 22px; color: #6366f1; font-weight: bold; }

        /* VIEWER & CLOSE BUTTON */
        #viewer { display: none; flex-grow: 1; padding: 15px; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .view-controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .exit-btn { 
            background: #ff4757; color: white; border: none; padding: 6px 15px; 
            border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 13px;
            display: flex; align-items: center; gap: 5px;
        }
        .exit-btn:hover { background: #ff6b81; }

        #file-content { 
            background: var(--view-bg); color: var(--text); padding: 15px; 
            border-radius: 12px; overflow: auto; font-family: monospace; 
            font-size: 14px; line-height: 1.5; height: 70vh; border: 1px solid var(--border);
        }
        #img-view { width: 100%; border-radius: 12px; display: none; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }

        .row-all { border-left: 5px solid #fbbf24; }
        .row-intl { border-left: 5px solid #10b981; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <span id="status-text" style="font-weight: bold; font-size: 15px;">🚀 IPTV EXPLORER</span>
        <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
    </div>
    
    <div id="list-area">
        <table>
            <tbody id="list-body"></tbody>
        </table>
    </div>

    <div id="viewer">
        <div class="view-controls">
            <span id="view-title" style="font-weight: 600; font-size: 14px; opacity: 0.8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 70%;"></span>
            <button class="exit-btn" onclick="closeViewer()">✕ THOÁT</button>
        </div>
        <img id="img-view" src="">
        <pre id="file-content"></pre>
    </div>
</div>

<script>
    const USER = 'thung65';
    let viewMode = 'repos';
    let currentRepo = '';

    function toggleTheme() {
        const t = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', t);
        localStorage.setItem('theme', t);
    }
    if(localStorage.getItem('theme') === 'dark') document.documentElement.setAttribute('data-theme', 'dark');

    async function loadRepos() {
        viewMode = 'repos';
        document.getElementById('list-area').style.display = 'block';
        document.getElementById('viewer').style.display = 'none';
        document.getElementById('status-text').innerText = '📂 TẤT CẢ NHÓM';
        const res = await fetch(`https://api.github.com/users/${USER}/repos?sort=updated`);
        render(await res.json(), 'repo');
    }

    async function loadFiles(repoName) {
        viewMode = 'files';
        currentRepo = repoName;
        document.getElementById('list-area').style.display = 'block';
        document.getElementById('viewer').style.display = 'none';
        document.getElementById('status-text').innerText = `📁 ${repoName.toUpperCase()}`;
        const res = await fetch(`https://api.github.com/repos/${USER}/${repoName}/contents/`);
        render(await res.json(), 'file');
    }

    async function openContent(url, name) {
        document.getElementById('list-area').style.display = 'none';
        document.getElementById('viewer').style.display = 'block';
        document.getElementById('view-title').innerText = name;
        
        const ext = name.split('.').pop().toLowerCase();
        if(['jpg','png','jpeg','gif','webp'].includes(ext)) {
            document.getElementById('img-view').src = url;
            document.getElementById('img-view').style.display = 'block';
            document.getElementById('file-content').style.display = 'none';
        } else {
            const res = await fetch(url);
            document.getElementById('file-content').innerText = await res.text();
            document.getElementById('file-content').style.display = 'block';
            document.getElementById('img-view').style.display = 'none';
        }
    }

    function closeViewer() {
        // Khi bấm nút thoát, hiện lại danh sách file của repo hiện tại
        document.getElementById('viewer').style.display = 'none';
        document.getElementById('list-area').style.display = 'block';
    }

    function render(items, type) {
        const body = document.getElementById('list-body');
        body.innerHTML = '';
        
        const backRow = document.createElement('tr');
        backRow.className = 'back-row';
        backRow.innerHTML = `<td colspan="2">⋯</td>`;
        backRow.onclick = () => { if(viewMode === 'files') loadRepos(); };
        body.appendChild(backRow);

        items.sort((a, b) => {
            const nA = a.name.toLowerCase(); const nB = b.name.toLowerCase();
            if(nA.includes('all')) return -1; if(nB.includes('all')) return 1;
            if(nA.includes('international')) return 1; if(nB.includes('international')) return -1;
            return 0;
        });

        items.forEach(item => {
            if(item.name === 'index.html' || item.name === '_redirects') return;
            const tr = document.createElement('tr');
            if(item.name.toLowerCase().includes('all')) tr.className = 'row-all';
            if(item.name.toLowerCase().includes('international')) tr.className = 'row-intl';
            
            tr.innerHTML = `
                <td>
                    <div style="font-weight: 600;">${type === 'repo' ? '📁' : '📄'} ${item.name}</div>
                    <div style="font-size: 11px; opacity: 0.6; margin-top: 4px;">${type === 'repo' ? 'Repository' : (item.size/1024).toFixed(1) + ' KB'}</div>
                </td>
                <td style="text-align: right; color: #ccc;">❯</td>
            `;
            tr.onclick = () => { if(type === 'repo') loadFiles(item.name); else openContent(item.download_url, item.name); };
            body.appendChild(tr);
        });
    }

    loadRepos();
</script>
</body>
</html>
