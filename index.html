<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trình quản lý tệp tự động</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
        .container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .file-item { display: block; padding: 12px; border-bottom: 1px dotted #ccc; text-decoration: none; color: #007bff; font-weight: 500; }
        .file-item:hover { background: #f9f9f9; }
        .loading { color: #888; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <h2>Index of /truyenhinhiptv</h2>
    <div id="file-list" class="loading">Đang quét danh sách tệp từ GitHub...</div>
</div>

<script>
    // Thay 'thung65' và 'truyenhinhiptv' bằng tên thật của bạn nếu có thay đổi
    const username = 'thung65';
    const repo = 'truyenhinhiptv';
    const apiUrl = `https://api.github.com/repos/${username}/${repo}/contents/`;

    async function fetchFiles() {
        try {
            const response = await fetch(apiUrl);
            const files = await response.json();
            const listElement = document.getElementById('file-list');
            listElement.innerHTML = ''; // Xóa chữ "Đang tải"

            // Sắp xếp: File 'All' lên đầu, 'International' xuống cuối
            files.sort((a, b) => {
                if (a.name.toLowerCase().includes('all')) return -1;
                if (b.name.toLowerCase().includes('all')) return 1;
                if (a.name.toLowerCase().includes('international')) return 1;
                if (b.name.toLowerCase().includes('international')) return -1;
                return 0;
            });

            files.forEach(file => {
                // Bỏ qua file index.html và _redirects để danh sách sạch sẽ
                if (file.name !== 'index.html' && file.name !== '_redirects') {
                    const a = document.createElement('a');
                    a.href = file.download_url; // Đây là link để "Bấm vào mở luôn"
                    a.className = 'file-item';
                    a.innerHTML = `📄 ${file.name}`;
                    listElement.appendChild(a);
                }
            });
        } catch (error) {
            document.getElementById('file-list').innerHTML = 'Lỗi khi tải danh sách tệp!';
        }
    }

    fetchFiles();
</script>

</body>
</html>
