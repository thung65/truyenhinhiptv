<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Index of /Iptv-vietnam/</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: "Segoe UI", Arial, sans-serif; background-color: #f2f2f2; margin: 0; padding: 10px; }
        /* Khung hình chữ nhật dọc chuẩn điện thoại */
        .container { max-width: 450px; margin: 10px auto; background: #fff; padding: 15px; border: 1px solid #ccc; box-shadow: 0 2px 5px rgba(0,0,0,0.1); min-height: 80vh; }
        h1 { font-size: 20px; border-bottom: 1px solid #ddd; padding-bottom: 10px; color: #333; margin: 0 0 10px 0; }
        
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th { text-align: left; padding: 8px 4px; border-bottom: 2px solid #0066cc; color: #0066cc; font-size: 13px; }
        td { padding: 10px 4px; border-bottom: 1px solid #eee; font-size: 13px; color: #444; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        tr:hover { background: #f9f9f9; cursor: pointer; }
        
        .name-link { color: #0066cc; text-decoration: none; font-weight: 500; display: flex; align-items: center; }
        .icon { width: 20px; margin-right: 6px; color: #777; text-align: center; font-size: 14px; }
        .txt-mono { font-family: "Courier New", Courier, monospace; font-size: 11px; }

        /* Viewer */
        #viewer { display: none; margin-top: 10px; border-top: 2px solid #0066cc; padding-top: 10px; }
        pre { background: #222; color: #fff; padding: 10px; border-radius: 4px; overflow-x: auto; font-size: 12px; white-space: pre-wrap; }
        #img-box img { max-width: 100%; border: 1px solid #ddd; }
        .btn-close { background: #444; color: #fff; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer; float: right; font-size: 12px; }
    </style>
</head>
<body>

<div class="container" id="main-view">
    <h1>Index of /Iptv-vietnam/</h1>
    <table>
        <thead>
            <tr>
                <th style="width: 45%;">Name</th>
                <th style="width: 38%;">Last Modified</th>
                <th style="width: 17%; text-align: right;">Size</th>
            </tr>
        </thead>
        <tbody id="file-list">
            <tr><td colspan="3" style="text-align:center; padding: 20px;">Đang tải tệp...</td></tr>
        </tbody>
    </table>
</div>

<div class="container" id="viewer">
    <button class="btn-close" onclick="closeViewer()">ĐÓNG XEM</button>
    <div id="v-title" style="margin-bottom: 10px; font-weight: bold; color: #0066cc; font-size: 13px;">File</div>
    <div id="img-box" style="display:none; text-align:center;"><img id="v-img" src=""></div>
    <pre id="v-code" style="display:none;"></pre>
</div>

<script>
    async function loadFiles() {
        const tbody = document.getElementById('file-list');
        try {
            // Bước 1: Chỉ gọi 1 lần duy nhất để lấy danh sách file
            const res = await fetch('https://api.github.com/repos/thung65/Iptv-vietnam/contents/');
            if (!res.ok) throw new Error();
            const files = await res.json();
            
            let html = `<tr><td colspan="3"><a href="/" class="name-link"><i class="fas fa-level-up-alt icon"></i>Parent Directory</a></td></tr>`;

            // Lấy thời gian hiện tại để làm mốc (đảm bảo không bao giờ lỗi API)
            const now = new Date();
            const dateStr = now.getFullYear() + "-" + 
                            (now.getMonth()+1).toString().padStart(2,'0') + "-" + 
                            now.getDate().toString().padStart(2,'0') + " " + 
                            now.getHours().toString().padStart(2,'0') + ":" + 
                            now.getMinutes().toString().padStart(2,'0');

            // Bước 2: Duyệt file
            files.forEach(f => {
                if (f.name === 'index.html') return;

                // Tính Size đúng kiểu 31k, 1k
                let sizeText = "-";
                if (f.type !== 'dir') {
                    sizeText = f.size >= 1024 ? Math.round(f.size / 1024) + "k" : f.size + "b";
                }

                // Chọn Icon
                let ext = f.name.split('.').pop().toLowerCase();
                let icon = f.type === 'dir' ? 'fa-folder' : 'fa-file-code';
                if (['jpg','png','jpeg','gif'].includes(ext)) icon = 'fa-file-image';

                html += `
                <tr onclick="openFile('${f.download_url}', '${f.name}')">
                    <td>
                        <span class="name-link"><i class="fas ${icon} icon"></i>${f.name}${f.type === 'dir' ? '/' : ''}</span>
                    </td>
                    <td class="txt-mono">${dateStr}</td>
                    <td style="text-align:right" class="txt-mono">${sizeText}</td>
                </tr>`;
            });
            tbody.innerHTML = html;

        } catch (e) {
            tbody.innerHTML = "<tr><td colspan='3' style='color:red; text-align:center; padding: 20px;'>Lỗi kết nối GitHub!<br>Vui lòng F5 trang.</td></tr>";
        }
    }

    async function openFile(url, name) {
        let ext = name.split('.').pop().toLowerCase();
        document.getElementById('main-view').style.display = 'none';
        document.getElementById('viewer').style.display = 'block';
        document.getElementById('v-title').innerText = "Đang xem: " + name;
        
        if (['jpg','png','jpeg','gif'].includes(ext)) {
            document.getElementById('img-box').style.display = 'block';
            document.getElementById('v-code').style.display = 'none';
            document.getElementById('v-img').src = url;
        } else {
            document.getElementById('img-box').style.display = 'none';
            document.getElementById('v-code').style.display = 'block';
            document.getElementById('v-code').innerText = "Đang đọc nội dung...";
            const r = await fetch(url);
            const txt = await r.text();
            document.getElementById('v-code').innerText = txt;
        }
    }

    function closeViewer() {
        document.getElementById('viewer').style.display = 'none';
        document.getElementById('main-view').style.display = 'block';
    }

    loadFiles();
</script>
</body>
</html>
