<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Index of /Iptv-vietnam/</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: "Segoe UI", Arial, sans-serif; background-color: #f2f2f2; margin: 0; padding: 10px; }
        .container { width: 95%; max-width: 1000px; margin: 10px auto; background: #fff; padding: 15px; border: 1px solid #ccc; box-shadow: 0 2px 5px rgba(0,0,0,0.1); min-height: 80vh; }
        @media (max-width: 600px) { .container { max-width: 450px; } }
        h1 { font-size: 20px; border-bottom: 1px solid #ddd; padding-bottom: 10px; color: #333; margin: 0 0 10px 0; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th { text-align: left; padding: 10px 5px; border-bottom: 2px solid #0066cc; color: #0066cc; font-size: 13px; cursor: pointer; }
        th:hover { background: #f0f7ff; }
        td { padding: 12px 5px; border-bottom: 1px solid #eee; font-size: 13px; color: #444; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .name-link { color: #0066cc; text-decoration: none; font-weight: 500; display: flex; align-items: center; }
        .icon { width: 22px; margin-right: 8px; color: #777; text-align: center; font-size: 15px; }
        .txt-mono { font-family: "Courier New", Courier, monospace; font-size: 13px; color: #555; font-weight: bold; }
        #viewer { display: none; margin-top: 10px; border-top: 2px solid #0066cc; padding-top: 15px; }
        pre { background: #1e1e1e; color: #fff; padding: 15px; border-radius: 5px; overflow-x: auto; font-size: 13px; white-space: pre-wrap; }
        .btn-close { background: #cc0000; color: #fff; border: none; padding: 7px 15px; border-radius: 4px; cursor: pointer; float: right; font-weight: bold; }
    </style>
</head>
<body>

<div class="container" id="main-view">
    <h1>Index of /Iptv-vietnam/</h1>
    <table>
        <thead>
            <tr>
                <th style="width: 45%;" onclick="sortTable(0)">Name <i class="fas fa-sort"></i></th>
                <th style="width: 40%;" onclick="sortTable(1)">Last Modified <i class="fas fa-sort"></i></th>
                <th style="width: 15%; text-align: right;" onclick="sortTable(2)">Size <i class="fas fa-sort"></i></th>
            </tr>
        </thead>
        <tbody id="file-list">
            <tr><td colspan="3" style="text-align:center; padding: 30px;">Đang kết nối GitHub...</td></tr>
        </tbody>
    </table>
</div>

<div class="container" id="viewer">
    <button class="btn-close" onclick="closeViewer()">ĐÓNG</button>
    <div id="v-title" style="margin-bottom: 15px; font-weight: bold; color: #0066cc;">File</div>
    <div id="img-box" style="display:none; text-align:center;"><img id="v-img" src="" style="max-width:100%"></div>
    <pre id="v-code" style="display:none;"></pre>
</div>

<script>
    async function loadFiles() {
        const tbody = document.getElementById('file-list');
        const user = 'thung65';
        const repo = 'Iptv-vietnam';
        
        try {
            // 1. Lấy danh sách file (Chỉ gọi 1 lần)
            const res = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/`);
            if (!res.ok) throw new Error();
            const files = await res.json();
            
            // 2. Lấy thông tin commit gần nhất của cả repo để lấy ngày giờ thật
            // Cách này lấy được ngày giờ đúng lúc Khôi upload mà không bị GitHub chặn
            const commitRes = await fetch(`https://api.github.com/repos/${user}/${repo}/commits?per_page=1`);
            const commitData = await commitRes.json();
            
            let dateStr = "2026-04-05 04:12"; // Mặc định
            if (commitData.length > 0) {
                const d = new Date(commitData[0].commit.committer.date);
                // Định dạng chuẩn YYYY-MM-DD HH:mm
                const y = d.getFullYear();
                const m = (d.getMonth() + 1).toString().padStart(2, '0');
                const day = d.getDate().toString().padStart(2, '0');
                const hr = d.getHours().toString().padStart(2, '0');
                const min = d.getMinutes().toString().padStart(2, '0');
                dateStr = `${y}-${m}-${day} ${hr}:${min}`;
            }

            let html = `<tr class="no-sort"><td colspan="3"><a href="/" class="name-link"><i class="fas fa-level-up-alt icon"></i>Parent Directory</a></td></tr>`;

            files.forEach(f => {
                if (f.name === 'index.html' || f.name === '.git') return;

                // Tính Size: 31k, 3k...
                let sizeText = f.type !== 'dir' ? (f.size >= 1024 ? Math.round(f.size / 1024) + "k" : f.size + "b") : "-";
                
                // Chọn Icon
                let ext = f.name.split('.').pop().toLowerCase();
                let icon = f.type === 'dir' ? 'fa-folder' : (['jpg', 'png', 'jpeg', 'gif'].includes(ext) ? 'fa-file-image' : 'fa-file-code');

                html += `
                <tr onclick="openFile('${f.download_url}', '${f.name}')">
                    <td><span class="name-link"><i class="fas ${icon} icon"></i>${f.name}${f.type === 'dir' ? '/' : ''}</span></td>
                    <td class="txt-mono">${dateStr}</td>
                    <td style="text-align:right" class="txt-mono">${sizeText}</td>
                </tr>`;
            });

            tbody.innerHTML = html;

        } catch (e) {
            tbody.innerHTML = "<tr><td colspan='3' style='text-align:center; padding:20px; color:red;'>Lỗi kết nối API GitHub. Khôi hãy thử bật 4G nhé!</td></tr>";
        }
    }

    // Hàm sắp xếp mượt mà, không đơ
    function sortTable(n) {
        const table = document.querySelector("table");
        const tbody = table.querySelector("tbody");
        const rows = Array.from(tbody.querySelectorAll("tr:not(.no-sort)"));
        const isAsc = table.getAttribute("data-sort-dir") === "asc";
        
        rows.sort((a, b) => {
            const aVal = a.cells[n].innerText.trim().toLowerCase();
            const bVal = b.cells[n].innerText.trim().toLowerCase();
            return isAsc ? aVal.localeCompare(bVal) : bVal.localeCompare(aVal);
        });

        table.setAttribute("data-sort-dir", isAsc ? "desc" : "asc");
        rows.forEach(row => tbody.appendChild(row));
    }

    // Các hàm mở/đóng file giữ nguyên
    async function openFile(url, name) {
        if (!url) return;
        document.getElementById('main-view').style.display = 'none';
        document.getElementById('viewer').style.display = 'block';
        document.getElementById('v-title').innerText = name;
        let ext = name.split('.').pop().toLowerCase();
        if (['jpg', 'png', 'jpeg'].includes(ext)) {
            document.getElementById('img-box').style.display = 'block';
            document.getElementById('v-code').style.display = 'none';
            document.getElementById('v-img').src = url;
        } else {
            document.getElementById('img-box').style.display = 'none';
            document.getElementById('v-code').style.display = 'block';
            document.getElementById('v-code').innerText = "Đang đọc nội dung...";
            const r = await fetch(url);
            document.getElementById('v-code').innerText = await r.text();
        }
    }

    function closeViewer() {
        document.getElementById('viewer').style.display = 'none';
        document.getElementById('main-view').style.display = 'block';
    }

    loadFiles();
</script>
</body>
</html>
