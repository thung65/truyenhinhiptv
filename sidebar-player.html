<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giới thiệu - Trần Tất Khôi</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; }
        .header { background: #007bff; color: white; padding: 20px; display: flex; align-items: center; position: sticky; top: 0; z-index: 100; }
        .back-btn { color: white; text-decoration: none; margin-right: 20px; font-size: 22px; }
        
        .container { max-width: 800px; margin: 20px auto; padding: 10px; }
        .file-item { display: flex; align-items: center; padding: 15px; background: white; margin-bottom: 10px; border-radius: 10px; text-decoration: none; color: #333; box-shadow: 0 2px 5px rgba(0,0,0,0.05); transition: 0.2s; }
        .file-item:hover { transform: translateX(5px); background: #fafafa; }
        
        /* Màu sắc cho từng loại Icon */
        .file-item i { margin-right: 15px; font-size: 22px; width: 25px; text-align: center; }
        .icon-txt { color: #576574; } /* Màu xám cho file văn bản */
        .icon-img { color: #eb4d4b; } /* Màu đỏ cho hình ảnh */
        .icon-play { color: #007bff; } /* Màu xanh cho file stream/video */
        .icon-code { color: #2ecc71; } /* Màu xanh lá cho file code/php */
    </style>
</head>
<body>
    <div class="header">
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <h2 id="folder-title" style="margin:0; font-size:18px; text-transform: uppercase;">Giới thiệu - Trần Tất Khôi</h2>
    </div>

    <div class="container" id="file-list">
        <p style="text-align:center;">Đang kiểm tra định dạng file...</p>
    </div>

    <script>
        const USER = 'thung65';
        const FOLDER_NAME = 'Sidebar-Player'; // Bạn đổi tên thư mục tương ứng cho mỗi file HTML

        async function fetchFiles() {
            const response = await fetch(`https://api.github.com/repos/${USER}/${FOLDER_NAME}/contents/`);
            const files = await response.json();
            const list = document.getElementById('file-list');
            list.innerHTML = '';

            files.forEach(file => {
                if(file.name === "index.html") return;

                const a = document.createElement('a');
                a.className = 'file-item';
                a.href = file.download_url;
                a.target = "_blank";

                // TỰ ĐỘNG PHÂN LOẠI ICON THEO ĐUÔI FILE
                let iconClass = "fas fa-file-alt icon-txt"; // Mặc định
                const fileName = file.name.toLowerCase();

                if (fileName.endsWith('.png') || fileName.endsWith('.jpg') || fileName.endsWith('.jpeg') || fileName.endsWith('.webp')) {
                    iconClass = "fas fa-image icon-img";
                } else if (fileName.endsWith('.m3u') || fileName.endsWith('.m3u8') || fileName.endsWith('.mp4')) {
                    iconClass = "fas fa-play-circle icon-play";
                } else if (fileName.endsWith('.php') || fileName.endsWith('.js') || fileName.endsWith('.html')) {
                    iconClass = "fas fa-code icon-code";
                } else if (fileName.endsWith('.txt')) {
                    iconClass = "fas fa-file-alt icon-txt";
                }

                a.innerHTML = `<i class="${iconClass}"></i> <span>${file.name}</span>`;
                list.appendChild(a);
            });
        }
        fetchFiles();
    </script>
</body>
</html>
