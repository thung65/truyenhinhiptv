<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi Tiết Thư Mục - Trần Tất Khôi B</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --bg: #f4f6f8; --card: #ffffff; --text: #333; --accent: #007bff; --border: #ececec; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 0; color: var(--text); }
        
        /* THANH ĐIỀU HƯỚNG TRÊN CÙNG */
        .top-nav { width: 100%; padding: 15px 20px; background: var(--card); border-bottom: 1px solid var(--border); box-sizing: border-box; }
        .back-btn { color: var(--accent); text-decoration: none; font-size: 14px; font-weight: bold; display: flex; align-items: center; cursor: pointer; }

        /* PHẦN BIO VÀ NÚT MẠNG XÃ HỘI (THU BÉ & CĂN GIỮA) */
        .profile-section { text-align: center; padding: 40px 20px; background: var(--card); border-bottom: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; }
        .profile-logo { width: 90px; height: 90px; border-radius: 50%; border: 3px solid var(--accent); padding: 3px; margin-bottom: 15px; }
        .profile-name { font-size: 22px; font-weight: bold; margin: 0; text-transform: uppercase; }
        
        .social-links { margin-top: 20px; display: flex; flex-direction: column; align-items: center; gap: 8px; width: 100%; max-width: 250px; }
        .social-btn { text-decoration: none; width: 100%; padding: 8px 0; border-radius: 6px; font-size: 12px; font-weight: bold; color: white; display: flex; align-items: center; justify-content: center; transition: 0.3s; width: 100%; }
        .btn-fb { background: #1877F2; } .btn-tk { background: #000; } .btn-gh { background: #333; } .btn-yt { background: #F00; }
        .social-btn i { font-size: 16px; margin-right: 10px; width: 18px; text-align: center; }
        
        /* DANH SÁCH FILE */
        .container { max-width: 800px; margin: 20px auto; background: #fff; border-radius: 10px; border: 1px solid var(--border); width: 95%; overflow: hidden; }
        .file-item { display: flex; align-items: center; padding: 15px 20px; border-bottom: 1px solid var(--border); cursor: pointer; transition: 0.2s; }
        .file-item:hover { background: #f1f3f5; }
        .file-item i { margin-right: 15px; font-size: 20px; width: 25px; text-align: center; color: #576574; }
        .file-name { flex-grow: 1; font-size: 14px; font-weight: 500; }

        /* KHUNG XEM NỘI DUNG (VIEWER) */
        #viewer { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #ffffff; z-index: 9999; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .v-nav { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--accent); padding-bottom: 10px; margin-bottom: 15px; }
        .v-title { font-weight: bold; color: var(--accent); font-size: 16px; overflow: hidden; text-overflow: ellipsis; }
        .btn-close { background: #ff4757; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        pre { white-space: pre-wrap; word-wrap: break-word; font-family: 'Consolas', monospace; background: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px solid #ddd; font-size: 13px; line-height: 1.5; color: #2d3436; }
    </style>
</head>
<body>

<div id="main-content">
    <div class="top-nav">
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> QUAY LẠI TRANG CHỦ</a>
    </div>

    <div class="profile-section">
        <img src="https://github.com/thung65.png" class="profile-logo">
        <h1 style="font-size: 18px; margin: 0; text-transform: uppercase;" id="folder-title">TRẦN TẤT KHÔI</h1>

    <div class="container" id="file-list">
        <div style="padding: 20px; text-align: center;">Đang tải danh sách file...</div>
    </div>
</div>

<div id="viewer">
    <div class="v-nav">
        <span class="v-title" id="v-title">Tên File</span>
        <button class="btn-close" onclick="closeViewer()">ĐÓNG XEM</button>
    </div>
    <pre id="v-content"></pre>
</div>

<script>
    const USER = 'thung65';
    const REPO = 'truyenhinhiptv'; // Nhớ sửa đúng tên Repository của Khôi ở đây

    // 1. Hàm lấy danh sách file từ GitHub
    async function loadFiles() {
        try {
            const res = await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/`);
            const data = await res.json();
            const listContainer = document.getElementById('file-list');
            
            if(!data || data.message === "Not Found") {
                listContainer.innerHTML = '<div style="padding:20px; color:red;">Lỗi: Không tìm thấy thư mục!</div>';
                return;
            }

            listContainer.innerHTML = data.map(file => {
                if(file.name === 'index.html' || file.type !== 'file') return '';
                
                // Gắn sự kiện onclick để chạy hàm openFile bên dưới
                return `
                    <div class="file-item" onclick="openFile('${file.download_url}', '${file.name}')">
                        <i class="fas fa-file-code"></i>
                        <span class="file-name">${file.name}</span>
                        <i class="fas fa-eye" style="font-size:12px; color:#aaa;"></i>
                    </div>
                `;
            }).join('');
        } catch (error) {
            document.getElementById('file-list').innerHTML = '<div style="padding:20px;">Lỗi kết nối API GitHub!</div>';
        }
    }

    // 2. Hàm mở và đọc nội dung file
    async function openFile(url, name) {
        const main = document.getElementById('main-content');
        const view = document.getElementById('viewer');
        const contentBox = document.getElementById('v-content');

        main.style.display = 'none'; // Ẩn trang danh sách
        view.style.display = 'block'; // Hiện khung xem
        document.getElementById('v-title').innerText = name;
        contentBox.innerText = "Đang tải nội dung file...";

        try {
            const res = await fetch(url);
            const text = await res.text();
            contentBox.innerText = text;
        } catch (e) {
            contentBox.innerText = "Lỗi: Không thể lấy nội dung file này!";
        }
    }

    // 3. Hàm đóng trình xem file
    function closeViewer() {
        document.getElementById('viewer').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
    }

    // Chạy hàm load khi trang web mở ra
    loadFiles();
</script>

</body>
</html>
